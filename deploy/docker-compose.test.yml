services:
  # MongoDB Database for Testing
  mongodb:
    image: mongo:8.0
    container_name: mongodb-test
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongodb_test_data:/data/db
    networks:
      - microservices-test-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka for Testing (KRaft mode)
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka-test
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CLUSTER_ID=q1Sh-9_ISia_zwGINzRvyQ
    networks:
      - microservices-test-network

  # Auth Service for Testing
  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service-test
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - MONGO_URI=mongodb://admin:password123@mongodb:27017
      - MONGO_DB=auth_db
      - JWT_SECRET=test-jwt-secret-key-for-testing
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=auth-service-test
      - KAFKA_TOPIC_USER_CREATED=user.created.v1
      - KAFKA_TOPIC_USER_UPDATED=user.updated.v1
      - KAFKA_TOPIC_USER_DELETED=user.deleted.v1
      - GIN_MODE=release
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices-test-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Service for Testing
  user-service:
    build:
      context: ../backend/user-service
      dockerfile: Dockerfile
    container_name: user-service-test
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MONGO_URI=mongodb://admin:password123@mongodb:27017
      - MONGO_DB=user_db
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=user-service-test
      - KAFKA_GROUP_ID=user-service-group-test
      - KAFKA_TOPIC_USER_CREATED=user.created.v1
      - KAFKA_TOPIC_USER_UPDATED=user.updated.v1
      - KAFKA_TOPIC_USER_DELETED=user.deleted.v1
      - GIN_MODE=release
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices-test-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway for Testing (Kratos)
  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway-test
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - microservices-test-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_test_data:

networks:
  microservices-test-network:
    driver: bridge
