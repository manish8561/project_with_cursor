version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: auth_db
    volumes:
      # Bumped name so a fresh volume is used after Mongo major upgrades (avoids FCV mismatch with old data).
      - mongodb_data_v8:/data/db
    networks:
      - microservices-network

  # Kafka (KRaft mode)
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CLUSTER_ID=q1Sh-9_ISia_zwGINzRvyQ
    networks:
      - microservices-network

  # Auth Service
  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - MONGO_DB=auth_db
      - JWT_SECRET=your-super-secret-jwt-key
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=auth-service
      - KAFKA_TOPIC_USER_CREATED=user.created.v1
      - KAFKA_TOPIC_USER_UPDATED=user.updated.v1
      - KAFKA_TOPIC_USER_DELETED=user.deleted.v1
      - LOG_LEVEL=-1
    depends_on:
      - mongodb
      - kafka
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Service
  user-service:
    build:
      context: ../backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - MONGO_DB=user_db
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=user-service
      - KAFKA_GROUP_ID=user-service-group
      - KAFKA_TOPIC_USER_CREATED=user.created.v1
      - KAFKA_TOPIC_USER_UPDATED=user.updated.v1
      - KAFKA_TOPIC_USER_DELETED=user.deleted.v1
      - LOG_LEVEL=-1
    depends_on:
      - mongodb
      - kafka
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (Kratos)
  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=-1
    depends_on:
      - auth-service
      - user-service
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../backend/api-gateway/configs/config.yaml:/data/conf/config.yaml:ro

  # Frontend (Angular + Nginx)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - api-gateway
    networks:
      - microservices-network

volumes:
  mongodb_data_v8:

networks:
  microservices-network:
    driver: bridge
